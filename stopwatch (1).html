<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stopwatch · SkillCraft Task 02</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#050709;--surface:#0d1117;--panel:#111820;--border:rgba(255,255,255,0.07);
      --accent:#00e5c0;--accent2:#00b4d8;--danger:#ff3b5c;--warn:#ffb830;
      --text:#e0e8f0;--muted:#4a5568;
      --mono:'Share Tech Mono',monospace;--display:'Rajdhani',sans-serif;--body:'Exo 2',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{background:var(--bg);color:var(--text);font-family:var(--body);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;padding:2rem 1rem 4rem;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,192,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,192,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

    header{position:relative;z-index:1;text-align:center;margin-bottom:2.5rem;animation:fadeDown 0.6s ease both;}
    .badge{display:inline-flex;align-items:center;gap:0.5rem;background:rgba(0,229,192,0.08);border:1px solid rgba(0,229,192,0.2);border-radius:99px;padding:0.3rem 1rem;font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;}
    .badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
    header h1{font-family:var(--display);font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    header p{color:var(--muted);font-size:0.85rem;letter-spacing:0.05em;margin-top:0.4rem;}

    .card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:2.5rem 2rem;width:100%;max-width:480px;box-shadow:0 0 60px rgba(0,0,0,0.5),0 0 0 1px rgba(0,229,192,0.05);animation:fadeUp 0.6s 0.1s ease both;}

    .ring-wrap{position:relative;width:260px;height:260px;margin:0 auto 2rem;}
    .ring-wrap svg{position:absolute;inset:0;transform:rotate(-90deg);}
    .ring-bg{fill:none;stroke:rgba(0,229,192,0.07);stroke-width:6;}
    .ring-progress{fill:none;stroke:url(#ringGrad);stroke-width:6;stroke-linecap:round;stroke-dasharray:729;stroke-dashoffset:729;transition:stroke-dashoffset 0.08s linear;filter:drop-shadow(0 0 6px rgba(0,229,192,0.6));}

    .time-display{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    #timeMain{font-family:var(--mono);font-size:clamp(2.4rem,9vw,3.2rem);letter-spacing:0.05em;color:var(--text);line-height:1;}
    #timeSub{font-family:var(--mono);font-size:1.1rem;color:var(--accent);letter-spacing:0.1em;margin-top:0.3rem;}
    .status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);margin-top:0.6rem;transition:background 0.3s;}
    .status-dot.running{background:var(--accent);animation:pulse 1s infinite;}
    .status-dot.paused{background:var(--warn);}

    .controls{display:flex;gap:1rem;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap;}
    .btn{font-family:var(--display);font-weight:600;font-size:1rem;letter-spacing:0.08em;text-transform:uppercase;padding:0.75rem 1.8rem;border-radius:10px;border:none;cursor:pointer;transition:transform 0.15s,box-shadow 0.2s,background 0.2s,opacity 0.2s;position:relative;overflow:hidden;}
    .btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.08);opacity:0;transition:opacity 0.15s;}
    .btn:hover::after{opacity:1;}
    .btn:active{transform:scale(0.96);}
    .btn:disabled{opacity:0.35;cursor:not-allowed;}
    .btn-start{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#050709;box-shadow:0 4px 20px rgba(0,229,192,0.3);}
    .btn-start:hover:not(:disabled){box-shadow:0 6px 28px rgba(0,229,192,0.5);transform:translateY(-2px);}
    .btn-pause{background:rgba(255,184,48,0.12);color:var(--warn);border:1px solid rgba(255,184,48,0.25);}
    .btn-pause:hover:not(:disabled){background:rgba(255,184,48,0.2);}
    .btn-lap{background:rgba(0,180,216,0.1);color:var(--accent2);border:1px solid rgba(0,180,216,0.25);}
    .btn-lap:hover:not(:disabled){background:rgba(0,180,216,0.2);}
    .btn-reset{background:rgba(255,59,92,0.1);color:var(--danger);border:1px solid rgba(255,59,92,0.2);}
    .btn-reset:hover:not(:disabled){background:rgba(255,59,92,0.2);}

    .divider{display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .divider span{font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);}

    .laps-wrap{max-height:220px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--muted) transparent;}
    #lapList{list-style:none;display:flex;flex-direction:column;gap:0.5rem;}
    #lapList li{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:0.65rem 1rem;font-size:0.88rem;animation:lapIn 0.3s ease both;}
    @keyframes lapIn{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:translateX(0);}}
    #lapList li.best{border-color:rgba(0,229,192,0.3);}
    #lapList li.worst{border-color:rgba(255,59,92,0.25);}
    .lap-num{font-family:var(--mono);color:var(--muted);font-size:0.78rem;min-width:40px;}
    .lap-time{font-family:var(--mono);font-size:1rem;color:var(--text);flex:1;text-align:center;}
    .lap-delta{font-family:var(--mono);font-size:0.78rem;min-width:64px;text-align:right;}
    .lap-tag{font-size:0.65rem;padding:0.1rem 0.45rem;border-radius:99px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-left:0.5rem;}
    .tag-best{background:rgba(0,229,192,0.15);color:var(--accent);}
    .tag-worst{background:rgba(255,59,92,0.15);color:var(--danger);}
    .empty-laps{text-align:center;color:var(--muted);font-size:0.85rem;padding:1.5rem 0;letter-spacing:0.03em;}

    .shortcuts{margin-top:1.2rem;display:flex;justify-content:center;gap:1.5rem;flex-wrap:wrap;}
    .sc{font-size:0.72rem;color:var(--muted);display:flex;align-items:center;gap:0.4rem;}
    .key{background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:0.1rem 0.4rem;font-family:var(--mono);font-size:0.7rem;color:var(--text);}

    footer{position:relative;z-index:1;margin-top:2rem;color:var(--muted);font-size:0.78rem;letter-spacing:0.05em;text-align:center;}
    footer span{color:var(--accent);}

    @keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}

    @media(max-width:420px){
      .ring-wrap{width:220px;height:220px;}
      #timeMain{font-size:2rem;}
      .controls{gap:0.6rem;}
      .btn{padding:0.65rem 1.2rem;font-size:0.9rem;}
    }
  </style>
</head>
<body>

<header>
  <div class="badge">SkillCraft Technology · Task 02</div>
  <h1>Stopwatch</h1>
  <p>Precision timing · Lap tracking · Interactive controls</p>
</header>

<div class="card">
  <div class="ring-wrap">
    <svg viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#00e5c0"/>
          <stop offset="100%" stop-color="#00b4d8"/>
        </linearGradient>
      </defs>
      <circle class="ring-bg"       cx="130" cy="130" r="116"/>
      <circle class="ring-progress" cx="130" cy="130" r="116" id="ring"/>
    </svg>
    <div class="time-display">
      <div id="timeMain">00:00</div>
      <div id="timeSub">.00</div>
      <div class="status-dot" id="statusDot"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="btnStart"  onclick="startStop()">Start</button>
    <button class="btn btn-lap"   id="btnLap"    onclick="recordLap()" disabled>Lap</button>
    <button class="btn btn-reset" id="btnReset"  onclick="resetTimer()" disabled>Reset</button>
  </div>

  <div class="divider"><span>Lap Times</span></div>
  <div class="laps-wrap">
    <ul id="lapList">
      <li style="background:none;border:none;animation:none;justify-content:center;">
        <span class="empty-laps">No laps recorded yet — hit <strong>Lap</strong> while running</span>
      </li>
    </ul>
  </div>

  <div class="shortcuts">
    <span class="sc"><span class="key">Space</span> Start / Pause</span>
    <span class="sc"><span class="key">L</span> Lap</span>
    <span class="sc"><span class="key">R</span> Reset</span>
  </div>
</div>

<footer>Built for <span>SkillCraft Technology</span> Web Dev Internship · Task 02</footer>

<script>
  const CIRC = 2 * Math.PI * 116;
  let startTime=0, elapsed=0, rafId=null, running=false, laps=[];

  const ring=document.getElementById('ring');
  const timeMain=document.getElementById('timeMain');
  const timeSub=document.getElementById('timeSub');
  const statusDot=document.getElementById('statusDot');
  const btnStart=document.getElementById('btnStart');
  const btnLap=document.getElementById('btnLap');
  const btnReset=document.getElementById('btnReset');
  const lapList=document.getElementById('lapList');

  ring.style.strokeDasharray=CIRC;
  ring.style.strokeDashoffset=CIRC;

  function pad2(n){return String(Math.floor(n)).padStart(2,'0');}

  function fmt(ms){
    const m=Math.floor(ms/60000);
    const s=Math.floor((ms%60000)/1000);
    const c=Math.floor((ms%1000)/10);
    return{main:`${pad2(m)}:${pad2(s)}`,sub:`.${pad2(c)}`};
  }

  function updateDisplay(ms){
    const{main,sub}=fmt(ms);
    timeMain.textContent=main;
    timeSub.textContent=sub;
    ring.style.strokeDashoffset=CIRC*(1-(ms%60000)/60000);
  }

  function tick(){
    elapsed=Date.now()-startTime;
    updateDisplay(elapsed);
    rafId=requestAnimationFrame(tick);
  }

  function startStop(){
    if(!running){
      startTime=Date.now()-elapsed;
      running=true;
      rafId=requestAnimationFrame(tick);
      btnStart.textContent='Pause';
      btnStart.className='btn btn-pause';
      btnLap.disabled=false;
      btnReset.disabled=false;
      statusDot.className='status-dot running';
    } else {
      cancelAnimationFrame(rafId);
      running=false;
      btnStart.textContent='Resume';
      btnStart.className='btn btn-start';
      btnLap.disabled=true;
      statusDot.className='status-dot paused';
    }
  }

  function resetTimer(){
    cancelAnimationFrame(rafId);
    running=false; elapsed=0; laps=[];
    updateDisplay(0);
    btnStart.textContent='Start';
    btnStart.className='btn btn-start';
    btnLap.disabled=true;
    btnReset.disabled=true;
    statusDot.className='status-dot';
    renderLaps();
  }

  function recordLap(){
    const total=elapsed;
    const prev=laps.reduce((a,l)=>a+l.duration,0);
    laps.push({number:laps.length+1,total,duration:total-prev});
    renderLaps();
    document.querySelector('.laps-wrap').scrollTop=0;
  }

  function renderLaps(){
    if(!laps.length){
      lapList.innerHTML=`<li style="background:none;border:none;animation:none;justify-content:center;"><span class="empty-laps">No laps recorded yet — hit <strong>Lap</strong> while running</span></li>`;
      return;
    }
    const durs=laps.map(l=>l.duration);
    const minD=Math.min(...durs), maxD=Math.max(...durs);
    lapList.innerHTML='';
    [...laps].reverse().forEach(lap=>{
      const isBest=laps.length>1&&lap.duration===minD;
      const isWorst=laps.length>1&&lap.duration===maxD;
      const{main:dm,sub:ds}=fmt(lap.duration);
      let deltaStr='', deltaColor='var(--muted)';
      const idx=lap.number-2;
      if(idx>=0){
        const diff=lap.duration-laps[idx].duration;
        const{main:dd,sub:dds}=fmt(Math.abs(diff));
        deltaStr=(diff>=0?'+':'-')+dd+dds;
        deltaColor=diff<=0?'var(--accent)':'var(--danger)';
      }
      const tag=isBest?`<span class="lap-tag tag-best">Best</span>`:isWorst?`<span class="lap-tag tag-worst">Slow</span>`:'';
      const li=document.createElement('li');
      if(isBest)li.className='best';
      if(isWorst)li.className='worst';
      li.innerHTML=`<span class="lap-num">#${String(lap.number).padStart(2,'0')}</span><span class="lap-time">${dm}<small style="opacity:.6;font-size:.75em">${ds}</small></span><span class="lap-delta" style="color:${deltaColor}">${deltaStr}</span>${tag}`;
      lapList.appendChild(li);
    });
  }

  document.addEventListener('keydown',e=>{
    if(e.code==='Space'){e.preventDefault();startStop();}
    if(e.code==='KeyL'&&!btnLap.disabled)recordLap();
    if(e.code==='KeyR'&&!btnReset.disabled)resetTimer();
  });

  renderLaps();
</script>
</body>
</html>
